<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>test 3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Nunito",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#f0f4ff;}
nav{height:60px;background:#fff;border-bottom:2px solid #e8edf5;display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:12px;position:relative;}
.logo{height:48px;width:auto;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;}
.pill{font-size:14px;font-weight:800;color:#1e2a4a;background:#f0f4ff;padding:5px 14px;border-radius:8px;border:1.5px solid #dde3f5;white-space:nowrap;flex-shrink:0;}
.nc{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;}
.ab{width:40px;height:40px;border-radius:50%;background:#f0f4ff;border:1.5px solid #dde3f5;color:#1e2a4a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:"Nunito",sans-serif;}
.ab:hover:not(:disabled){background:#e8edff;border-color:#3b5bdb;color:#3b5bdb;}
.ab:disabled{opacity:.35;cursor:not-allowed;}
.ab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.ct{color:#1e2a4a;font-weight:800;font-size:14px;min-width:130px;text-align:center;}
.layout{flex:1;display:flex;overflow:hidden;}
.menu{width:220px;flex-shrink:0;background:#fff;border-right:2px solid #e8edf5;display:flex;flex-direction:column;transition:width .25s;overflow:hidden;}
.menu.shut{width:38px;}
.mt{background:#f0f4ff;border:none;border-bottom:1.5px solid #e8edf5;color:#3b5bdb;font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;padding:10px 12px;cursor:pointer;text-align:left;white-space:nowrap;flex-shrink:0;}
.mt:hover{background:#e8edff;}
.mi{flex:1;overflow-y:auto;padding:12px 10px;min-width:220px;}
.mh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#8492b4;margin-bottom:10px;}
.mitem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:4px;border:1.5px solid transparent;}
.mitem:hover{background:#e8edff;border-color:#dde3f5;}
.mitem.on{background:#e8edff;border-color:#3b5bdb;}
.mn{width:22px;height:22px;border-radius:4px;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ml{font-size:12px;font-weight:700;color:#1e2a4a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sw{flex:1;position:relative;overflow:hidden;}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;transition:opacity .3s;}
iframe.on{opacity:1;pointer-events:all;}
</style></head><body>
